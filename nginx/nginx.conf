server {
    listen 80;
    server_name preplingo.ravishan.me;

    client_max_body_size 20M;

    # Docker's internal DNS resolver — required for runtime upstream resolution.
    # Without this, nginx resolves hostnames once at startup and crashes if
    # backend/frontend containers aren't ready yet.
    resolver 127.0.0.11 valid=10s;

    # ── Backend API ──────────────────────────────────────────────
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /health {
        set $backend http://backend:8000;
        proxy_pass $backend;
    }

    location /docs {
        set $backend http://backend:8000;
        proxy_pass $backend;
    }

    location /openapi.json {
        set $backend http://backend:8000;
        proxy_pass $backend;
    }

    # ── Streamlit Frontend ────────────────────────────────────────
    location /_stcore/ {
        set $frontend http://frontend:8501;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location / {
        set $frontend http://frontend:8501;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
