services:

  # ── Backend (FastAPI) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: preplingo-backend
    expose:
      - "8000"                          # Internal only — nginx proxies externally
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_FALLBACK_MODEL=${GROQ_FALLBACK_MODEL:-llama-3.1-8b-instant}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/preplingo.db}
      - VECTOR_STORE_PATH=${VECTOR_STORE_PATH:-./vector_store_data}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - embedding-cache:/root/.cache/huggingface   # HuggingFace model cache
      - vector-data:/app/vector_store_data          # ChromaDB persistence
      - db-data:/app/data                           # SQLite DB file only (not /app root)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - preplingo-net

  # ── Frontend (Streamlit) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend_streamlit
      dockerfile: Dockerfile
    container_name: preplingo-frontend
    expose:
      - "8501"                          # Internal only — nginx proxies externally
    environment:
      # Internal Docker network URL — frontend Python process calls backend directly
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy     # Wait for backend to be healthy before starting
    restart: unless-stopped
    networks:
      - preplingo-net

  # ── Nginx (Reverse Proxy) ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: preplingo-nginx
    ports:
      - "80:80"                         # Public HTTP entry point
      # - "443:443"                     # Uncomment after setting up HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro   # Uncomment for HTTPS certs
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - preplingo-net

networks:
  preplingo-net:
    driver: bridge

volumes:
  embedding-cache:
    driver: local
  vector-data:
    driver: local
  db-data:
    driver: local
