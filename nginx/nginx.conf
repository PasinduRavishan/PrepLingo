upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:8501;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;   # Allow PDF uploads up to 20 MB

    # ── Backend API ──────────────────────────────────────────────
    # All /api/* requests go to FastAPI
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeouts — LLM calls can take 10-30s, evaluations add more
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # FastAPI health check and Swagger docs (pass through directly)
    location /health {
        proxy_pass http://backend;
    }

    location /docs {
        proxy_pass http://backend;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # ── Streamlit Frontend ────────────────────────────────────────
    # Everything else goes to Streamlit.
    # Streamlit requires WebSocket support for live updates.
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket upgrade — required for Streamlit's live connection
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeout — Streamlit keeps a persistent WebSocket connection
        proxy_read_timeout 86400s;
    }

    # Streamlit internal paths (static assets, stream endpoint)
    location /_stcore/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
